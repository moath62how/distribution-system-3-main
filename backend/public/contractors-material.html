<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقاولو العجل - نظام التوزيع</title>
    
    <!-- Material Theme CSS -->
    <link rel="stylesheet" href="css/material-theme.css">
    <link rel="stylesheet" href="css/sidebar-material.css">
    <link rel="stylesheet" href="css/sweetalert-material.css">
    <link rel="stylesheet" href="css/loaders.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="page-header-md">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <h1 class="page-header-title">
                    <span class="material-symbols-outlined" style="vertical-align: middle;">engineering</span>
                    إدارة مقاولو العجل
                </h1>
                <div style="position: relative;">
                    <span class="material-symbols-outlined" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--md-on-surface-variant); pointer-events: none;">search</span>
                    <input 
                        type="text" 
                        id="contractorSearch"
                        class="form-input-md" 
                        placeholder="ابحث عن مقاول..." 
                        style="padding-right: 2.5rem; width: 20rem; font-size: 0.875rem;"
                    />
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <button class="btn-md-icon" title="الإشعارات">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button class="btn-md-icon" title="الإعدادات">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <div style="width: 1px; height: 2rem; background: var(--md-outline-variant);"></div>
                <img 
                    src="https://ui-avatars.com/api/?name=User&background=545f73&color=fff&size=128" 
                    alt="User" 
                    style="width: 2.5rem; height: 2.5rem; border-radius: 50%; border: 2px solid var(--md-surface-container);"
                />
            </div>
        </header>

        <!-- Page Content -->
        <div style="padding: 2rem;">
            <!-- Title & Actions -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 class="font-headline" style="font-size: 1.5rem; font-weight: 800; color: var(--md-primary); margin-bottom: 0.25rem;">
                        قائمة المقاولين
                    </h2>
                    <p style="color: var(--md-on-surface-variant); font-size: 0.875rem;">
                        إدارة المقاولين والمشاوير والمستحقات
                    </p>
                </div>
                <button class="btn-md btn-md-primary" id="addContractorBtn">
                    <span class="material-symbols-outlined">add</span>
                    إضافة مقاول جديد
                </button>
            </div>

            <!-- Contractors Grid -->
            <div id="contractorsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem;">
                <div class="loading-md">جاري التحميل...</div>
            </div>
        </div>
    </main>

    <!-- Add Contractor Modal -->
    <div id="addContractorModal" class="modal-md">
        <div class="modal-content-md">
            <div class="modal-header-md">
                <h2 class="modal-title-md">إضافة مقاول جديد</h2>
                <button class="modal-close-md">&times;</button>
            </div>
            <div class="modal-body-md">
                <div id="addContractorMessage"></div>
                <form id="addContractorForm">
                    <div class="form-group-md">
                        <label class="form-label-md" for="contractorName">اسم المقاول *</label>
                        <input 
                            type="text" 
                            class="form-input-md" 
                            id="contractorName" 
                            name="name" 
                            required 
                            maxlength="255" 
                            autocomplete="name"
                            placeholder="أدخل اسم المقاول"
                        />
                    </div>

                    <div class="form-group-md">
                        <label class="form-label-md">الأرصدة الافتتاحية (حسب المشروع/العميل)</label>
                        <div id="contractorOpeningBalancesContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                            <!-- Opening balance rows will be added here dynamically -->
                        </div>
                        <button 
                            type="button" 
                            class="btn-md btn-md-sm btn-md-secondary" 
                            id="addContractorOpeningBalanceBtn" 
                            style="margin-top: 1rem;"
                        >
                            <span class="material-symbols-outlined" style="font-size: 1rem;">add</span>
                            إضافة رصيد افتتاحي
                        </button>
                        <small class="form-help-md">
                            الرصيد الافتتاحي لكل مشروع/عميل (موجب = نحن مدينون لهم)
                        </small>
                    </div>

                    <div class="modal-actions-md">
                        <button type="button" class="btn-md btn-md-outline modal-close-md">إلغاء</button>
                        <button type="submit" class="btn-md btn-md-primary">حفظ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
    <script src="js/utils/form-protection.js"></script>
    <script src="js/utils/form-submit.js"></script>
    <script src="js/utils/auto-protect-forms.js"></script>
    <script src="js/material-utils.js"></script>
    <script src="js/csp-fix.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/contractors.js"></script>
    <script src="js/contractors-material.js"></script>
    <script src="js/utils/loader.js"></script>
</body>
</html>
