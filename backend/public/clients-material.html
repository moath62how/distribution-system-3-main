<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء - نظام التوزيع</title>
    
    <!-- Material Theme CSS -->
    <link rel="stylesheet" href="css/material-theme.css">
    <link rel="stylesheet" href="css/sidebar-material.css">
    <link rel="stylesheet" href="css/sweetalert-material.css">
    <link rel="stylesheet" href="css/loaders.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
    <!-- Global Loader -->
    <div class="loader-overlay" id="globalLoader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="page-header-md">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <h1 class="page-header-title">
                    <span class="material-symbols-outlined" style="vertical-align: middle;">group</span>
                    إدارة العملاء
                </h1>
                <div style="position: relative;">
                    <span class="material-symbols-outlined" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--md-on-surface-variant); pointer-events: none;">search</span>
                    <input 
                        type="text" 
                        id="clientSearch"
                        class="form-input-md" 
                        placeholder="ابحث عن عميل..." 
                        style="padding-right: 2.5rem; width: 20rem; font-size: 0.875rem;"
                    />
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <button class="btn-md-icon" title="الإشعارات">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button class="btn-md-icon" title="الإعدادات">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <div style="width: 1px; height: 2rem; background: var(--md-outline-variant);"></div>
                <img 
                    src="https://ui-avatars.com/api/?name=User&background=545f73&color=fff&size=128" 
                    alt="User" 
                    style="width: 2.5rem; height: 2.5rem; border-radius: 50%; border: 2px solid var(--md-surface-container);"
                />
            </div>
        </header>

        <!-- Page Content -->
        <div style="padding: 2rem;">
            <!-- Title & Actions -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 class="font-headline" style="font-size: 1.5rem; font-weight: 800; color: var(--md-primary); margin-bottom: 0.25rem;">
                        قائمة العملاء
                    </h2>
                    <p style="color: var(--md-on-surface-variant); font-size: 0.875rem;">
                        عرض وإدارة جميع العملاء والحسابات
                    </p>
                </div>
                <button class="btn-md btn-md-primary" id="addClientBtn">
                    <span class="material-symbols-outlined">add</span>
                    إضافة عميل جديد
                </button>
            </div>

            <!-- Search Controls -->
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <button id="searchBtn" class="btn-md btn-md-sm btn-md-secondary">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">search</span>
                    بحث
                </button>
                <button id="clearSearchBtn" class="btn-md btn-md-sm btn-md-outline">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">close</span>
                    مسح البحث
                </button>
            </div>

            <!-- Clients Grid -->
            <div id="clientsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <div class="loading-md">جاري التحميل...</div>
            </div>

            <!-- Pagination -->
            <div id="paginationContainer"></div>
        </div>
    </main>

    <!-- Add Client Modal -->
    <div id="addClientModal" class="modal-md">
        <div class="modal-content-md">
            <div class="modal-header-md">
                <h2 class="modal-title-md">إضافة عميل جديد</h2>
                <button class="modal-close-md">&times;</button>
            </div>
            <div class="modal-body-md">
                <div id="addClientMessage"></div>
                <form id="addClientForm">
                    <div class="form-group-md">
                        <label class="form-label-md" for="clientName">اسم العميل *</label>
                        <input 
                            type="text" 
                            class="form-input-md" 
                            id="clientName" 
                            name="name" 
                            required 
                            autocomplete="name" 
                            placeholder="أدخل اسم العميل"
                        />
                    </div>

                    <div class="form-group-md">
                        <label class="form-label-md" for="clientPhone">رقم الهاتف</label>
                        <input 
                            type="tel" 
                            class="form-input-md" 
                            id="clientPhone" 
                            name="phone" 
                            placeholder="اختياري" 
                            autocomplete="tel"
                        />
                    </div>

                    <div class="form-group-md">
                        <label class="form-label-md" for="openingBalance">الرصيد الافتتاحي (جنيه)</label>
                        <input 
                            type="number" 
                            class="form-input-md" 
                            id="openingBalance" 
                            name="opening_balance" 
                            step="0.01" 
                            placeholder="0.00" 
                            autocomplete="off"
                        />
                        <small class="form-help-md">
                            موجب = العميل يدين لنا، سالب = نحن ندين للعميل
                        </small>
                    </div>

                    <div class="modal-actions-md">
                        <button type="button" class="btn-md btn-md-outline modal-close-md">إلغاء</button>
                        <button type="submit" class="btn-md btn-md-primary">إضافة العميل</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/utils/crud-buttons.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/form-protection.js"></script>
    <script src="js/utils/form-submit.js"></script>
    <script src="js/utils/auto-protect-forms.js"></script>
    <script src="js/material-utils.js"></script>
    <script src="js/csp-fix.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/clients-material.js"></script>
    <script src="js/utils/loader.js"></script>
</body>
</html>
