<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>تسجيل الدخول - إنفرا فاينانس</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-container": "#4c8dff",
                        "surface": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-primary-fixed": "#111c2d",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "inverse-on-surface": "#eff1f3",
                        "primary": "#091426",
                        "outline-variant": "#c5c6cd",
                        "on-primary-fixed-variant": "#3c475a",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#d8e2ff",
                        "surface-dim": "#d8dadc",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-container": "#00275b",
                        "tertiary-fixed-dim": "#adc6ff",
                        "secondary-fixed-dim": "#4edea3",
                        "on-surface-variant": "#45474c",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#545f73",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#001a42",
                        "secondary": "#006c49",
                        "on-primary-container": "#8590a6",
                        "primary-container": "#1e293b",
                        "secondary-fixed": "#6ffbbe",
                        "primary-fixed-dim": "#bcc7de",
                        "error-container": "#ffdad6",
                        "on-background": "#191c1e",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface": "#191c1e",
                        "primary-fixed": "#d8e3fb",
                        "surface-bright": "#f7f9fb",
                        "secondary-container": "#6cf8bb",
                        "on-secondary-fixed": "#002113",
                        "background": "#f7f9fb",
                        "outline": "#75777d",
                        "tertiary": "#001334",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-container": "#00714d",
                        "inverse-primary": "#bcc7de",
                        "on-secondary-fixed-variant": "#005236"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "lg": "1.5rem",
                        "base": "4px",
                        "gutter": "1.5rem",
                        "xs": "0.25rem",
                        "margin": "2rem",
                        "xl": "2rem",
                        "sm": "0.5rem",
                        "md": "1rem"
                    },
                    fontFamily: {
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "h3": ["Inter"],
                        "h1": ["Inter"],
                        "data-tabular": ["Inter"],
                        "body-lg": ["Inter"],
                        "h2": ["Inter"]
                    },
                    fontSize: {
                        "label-sm": ["12px", { lineHeight: "1", letterSpacing: "0.02em", fontWeight: "500" }],
                        "body-md": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        "h3": ["18px", { lineHeight: "1.4", fontWeight: "600" }],
                        "h1": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "data-tabular": ["14px", { lineHeight: "1.4", fontWeight: "500" }],
                        "body-lg": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "h2": ["24px", { lineHeight: "1.3", fontWeight: "600" }]

            }

</head>

<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-md lg:p-margin">
    <div class="w-full max-w-md">
        <!-- Brand Header -->
        <div class="text-center mb-xl">
            <h1 class="font-h1 text-h1 text-primary mb-sm" style=""><span
                    style="color: rgb(30, 41, 59); font-family: Cairo, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif; font-size: 20px; letter-spacing: -0.5px; background-color: rgb(255, 255, 255);">InfraFinance</span>
            </h1>
            <h2 class="font-h2 text-h2 text-on-surface mb-xs" style="">تسجيل الدخول</h2>
            <p class="font-body-md text-body-md text-on-surface-variant" style="">الوصول إلى لوحة القيادة المالية الخاصة
                بك</p>
        </div>
        <!-- Login Card -->
        <div class="bg-surface-container-lowest rounded-xl border border-surface-container-highest shadow-sm p-lg">
            <form id="loginForm" action="#" class="space-y-lg" method="POST">
                <!-- Phone Number -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface mb-sm" for="phone" style="">رقم
                        الهاتف</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 pl-3 flex items-center pointer-events-none pr-3">
                            <span class="material-symbols-outlined text-on-surface-variant" data-icon="phone"
                                data-weight="regular" style="">phone</span>
                        </div>
                        <input
                            class="block w-full pl-3 pr-10 py-sm border-outline-variant rounded-DEFAULT focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface text-on-surface text-left"
                            dir="ltr" id="phone" name="phone" placeholder="01xxxxxxxxx or 1xxxxxxxxx or +201xxxxxxxxx"
                            required="" type="tel">
                    </div>
                    <p class="mt-1 text-xs text-on-surface-variant">يمكنك إدخال الرقم بأي صيغة: 01xxxxxxxxx أو
                        1xxxxxxxxx أو +201xxxxxxxxx</p>
                </div>
                <!-- Password -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface mb-sm" for="password" style="">كلمة
                        المرور</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 pl-3 flex items-center pointer-events-none pr-3">
                            <span class="material-symbols-outlined text-on-surface-variant" data-icon="lock"
                                data-weight="regular" style="">lock</span>
                        </div>
                        <input
                            class="block w-full pl-3 pr-10 py-sm border-outline-variant rounded-DEFAULT focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface text-on-surface text-left"
                            dir="ltr" id="password" name="password" placeholder="••••••••" required="" type="password">
                    </div>
                    <div class="mt-sm flex justify-start">
                        <a class="font-label-sm text-label-sm text-tertiary-container hover:text-primary transition-colors"
                            href="#" style="">نسيت كلمة المرور؟</a>
                    </div>
                </div>
                <!-- Role Selection -->
                <div>
                    <label class="block font-label-sm text-label-sm text-on-surface mb-sm" for="role" style="">اختر
                        الدور</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 pl-3 flex items-center pointer-events-none pr-3">
                            <span class="material-symbols-outlined text-on-surface-variant" data-icon="badge"
                                data-weight="regular" style="">badge</span>
                        </div>
                        <select
                            class="block w-full pl-3 pr-10 py-sm border-outline-variant rounded-DEFAULT focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface text-on-surface appearance-none"
                            id="role" name="role">
                            <option value="manager">مدير</option>
                            <option value="accountant">محاسب</option>
                            <option value="tech_support">دعم فني</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-2 text-on-surface-variant">
                            <span class="material-symbols-outlined" data-icon="arrow_drop_down" data-weight="regular"
                                style="">arrow_drop_down</span>
                        </div>
                    </div>
                </div>
                <!-- Error Message -->
                <div id="errorMessage"
                    class="hidden p-3 bg-error-container text-on-error-container rounded-DEFAULT text-sm">
                </div>
                <!-- Submit Button -->
                <div class="pt-sm">
                    <button id="loginButton"
                        class="w-full flex justify-center py-md px-4 border border-transparent rounded-DEFAULT shadow-sm font-h3 text-h3 text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors"
                        type="submit" style="">
                        تسجيل الدخول
                    </button>
                </div>
            </form>
        </div>
        <!-- Security Note -->
        <div class="mt-lg flex items-center justify-center space-x-xs space-x-reverse text-on-surface-variant">
            <span class="material-symbols-outlined text-[16px]" data-icon="shield" data-weight="fill"
                style="font-variation-settings: &quot;FILL&quot; 1;">shield</span>
            <span class="font-label-sm text-label-sm" style="">أمن بمستوى مؤسسي</span>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('loginForm');
            const loginButton = document.getElementById('loginButton');
            const errorMessage = document.getElementById('errorMessage');
            const phoneInput = document.getElementById('phone');
            const passwordInput = document.getElementById('password');
            const roleSelect = document.getElementById('role');

            // Check if already logged in
            if (authManager.isAuthenticated()) {
                window.location.href = '/index.html';
                return;
            }

            loginForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                // Clear previous errors
                errorMessage.classList.add('hidden');

                // Get form values
                const phone = phoneInput.value.trim();
                const password = passwordInput.value;
                const role = roleSelect.value;

                // Basic validation
                if (!phone || !password) {
                    showError('يرجى إدخال رقم الهاتف وكلمة المرور');
                    return;
                }

                // Disable button and show loading
                loginButton.disabled = true;
                loginButton.textContent = 'جاري تسجيل الدخول...';

                try {
                    // Normalize phone number to +20 format
                    let fullPhone = phone;

                    // Remove any spaces or special characters except +
                    fullPhone = fullPhone.replace(/[^\d+]/g, '');

                    // Handle different formats:
                    // 01xxxxxxxxx -> +201xxxxxxxxx
                    if (fullPhone.startsWith('01') && fullPhone.length === 11) {
                        fullPhone = '+2' + fullPhone;
                    }
                    // 1xxxxxxxxx -> +201xxxxxxxxx
                    else if (fullPhone.startsWith('1') && fullPhone.length === 10) {
                        fullPhone = '+20' + fullPhone;
                    }
                    // +201xxxxxxxxx -> keep as is
                    else if (fullPhone.startsWith('+201') && fullPhone.length === 13) {
                        // Already in correct format
                    }
                    // 201xxxxxxxxx -> +201xxxxxxxxx
                    else if (fullPhone.startsWith('201') && fullPhone.length === 12) {
                        fullPhone = '+' + fullPhone;
                    }
                    // If none of the above, assume it needs +20 prefix
                    else if (!fullPhone.startsWith('+')) {
                        fullPhone = '+20' + fullPhone;
                    }

                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            phone: fullPhone,
                            password: password
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Store token and user info
                        localStorage.setItem('authToken', data.data.token);
                        localStorage.setItem('userInfo', JSON.stringify(data.data.user));

                        // Redirect to dashboard
                        window.location.href = '/index.html';
                    } else {
                        showError(data.message || 'فشل تسجيل الدخول. يرجى التحقق من بياناتك');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showError('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى');
                } finally {
                    // Re-enable button
                    loginButton.disabled = false;
                    loginButton.textContent = 'تسجيل الدخول';
                }
            });

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.classList.remove('hidden');
            }

            // Phone number formatting - allow digits and +
            phoneInput.addEventListener('input', function (e) {
                let value = e.target.value;
                // Remove any characters except digits and +
                value = value.replace(/[^\d+]/g, '');
                // Only allow + at the beginning
                if (value.indexOf('+') > 0) {
                    value = value.replace(/\+/g, '');
                }
                // Limit to reasonable length (13 chars for +201xxxxxxxxx)
                if (value.length > 13) {
                    value = value.substring(0, 13);
                }
                e.target.value = value;
            });
        });
    </script>
</body>

</html>
